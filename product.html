<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết sản phẩm | E-com</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">E-com.</a>
      <nav class="nav-links">
        <a href="index.html">Sản phẩm</a>
        <a href="cart.html" class="cart-link">
          Giỏ hàng
          <span class="cart-count" id="cart-count" style="display: none;">0</span>
        </a>
        <a href="admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main>
    <a href="index.html" class="btn btn-outline mb-4">&larr; Trở lại danh sách</a>
    <div id="product-detail-container">
      <div style="text-align: center; padding: 3rem; color: var(--text-muted);">
        Đang tải thông tin sản phẩm...
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 E-com. Không có bản quyền (Demo).</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script>
    async function renderProductDetail() {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = parseInt(urlParams.get('id'));
      
      const container = document.getElementById('product-detail-container');
      
      if (!productId) {
        container.innerHTML = '<div class="alert alert-danger">Không tìm thấy mã sản phẩm.</div>';
        return;
      }

      try {
        const product = await api.getProduct(productId);

        if (!product) {
          container.innerHTML = '<div class="alert alert-danger">Sản phẩm không tồn tại.</div>';
          return;
        }

        document.title = `${product.name} | E-com`;

        const outOfStock = product.stock <= 0;

        container.innerHTML = `
          <div class="product-detail">
            <div class="product-detail-image">
              <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/600x400?text=No+Image';">
            </div>
            <div class="product-detail-info">
              <h1 class="page-title" style="margin-bottom: 0.5rem; font-size: 2.5rem;">${product.name}</h1>
              <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                <span style="background: var(--bg-secondary); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; font-weight: 500;">
                  ${product.category || 'Khác'}
                </span>
                <span style="font-size: 0.9rem; color: ${outOfStock ? 'var(--danger-color)' : 'var(--text-muted)'}; font-weight: 600;">
                  ${outOfStock ? 'Hết hàng' : `Còn lại: ${product.stock}`}
                </span>
              </div>
              <div class="product-price" style="font-size: 2rem; margin-bottom: 2rem;">${formatCurrency(product.price)}</div>
              <div class="product-desc" style="font-size: 1.1rem; line-height: 1.7; margin-bottom: 2.5rem;">${product.desc}</div>
              <div style="margin-top: auto;">
                <button class="btn btn-primary" 
                        style="padding: 1rem 2rem; font-size: 1.1rem; width: 100%; max-width: 300px; opacity: ${outOfStock ? '0.5' : '1'}; cursor: ${outOfStock ? 'not-allowed' : 'pointer'};" 
                        onclick='handleAddToCart(${JSON.stringify(product)})'
                        ${outOfStock ? 'disabled' : ''}>
                  ${outOfStock ? 'Hết hàng' : 'Thêm vào giỏ hàng'}
                </button>
              </div>
            </div>
          </div>
        `;
      } catch (err) {
        container.innerHTML = `<div class="alert alert-danger">Lỗi: ${err.message}</div>`;
      }
    }

    function handleAddToCart(product) {
      addToCart(product);
    }

    document.addEventListener('DOMContentLoaded', renderProductDetail);
  </script>
</body>
</html>
