<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giỏ hàng | E-com</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">E-com.</a>
      <nav class="nav-links">
        <a href="index.html">Sản phẩm</a>
        <a href="cart.html" class="active cart-link">
          Giỏ hàng
          <span class="cart-count" id="cart-count" style="display: none;">0</span>
        </a>
        <a href="admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main>
    <h1 class="page-title">Giỏ hàng của bạn</h1>
    
    <div id="checkout-success" class="alert alert-success hidden">
      ✅ Đặt hàng thành công! Mã đơn hàng của bạn là: #<span id="order-id"></span>. Chúng tôi sẽ sớm liên hệ xác nhận nhé.
    </div>

    <div id="cart-container">
      <div id="cart-items" class="cart-list mb-4">
        <!-- Danh sách giỏ hàng render ở đây -->
        <div style="text-align: center; padding: 2rem; color: var(--text-muted);">
          Đang tải giỏ hàng...
        </div>
      </div>

      <div class="cart-summary" id="cart-summary" style="display: none;">
        <div class="summary-row">
          <span>Tổng số lượng:</span>
          <span id="total-qty">0</span>
        </div>
        <div class="summary-row summary-total">
          <span>Thành tiền:</span>
          <span id="total-price">0 đ</span>
        </div>
        <button id="btn-checkout" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; font-size: 1.1rem; padding: 1rem;">
          Tiến hành thanh toán
        </button>
      </div>
    </div>
  </main>

  <!-- Modal Checkout -->
  <div class="modal" id="checkout-modal">
    <div class="modal-content" style="max-width: 500px;">
      <div class="modal-header">
        <h2 class="modal-title">Thông tin Giao hàng & Thanh toán</h2>
        <button class="close-btn" onclick="document.getElementById('checkout-modal').classList.remove('active')">&times;</button>
      </div>
      <form id="checkout-form">
        <div class="form-group">
          <label>Họ và Tên *</label>
          <input type="text" id="co-name" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Số điện thoại *</label>
          <input type="tel" id="co-phone" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Địa chỉ nhận hàng chi tiết *</label>
          <textarea id="co-address" class="form-control" rows="3" required placeholder="Số nhà, tên đường, phường/xã, quận/huyện..."></textarea>
        </div>
        
        <div class="form-group" style="margin-top: 1.5rem;">
          <label style="margin-bottom: 0.5rem; display: block; font-weight: 600;">Phương thức Thanh toán</label>
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <input type="radio" name="paymethod" value="COD" checked> Thanh toán khi nhận hàng (COD)
            </label>
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <input type="radio" name="paymethod" value="Chuyển khoản"> Chuyển khoản ngân hàng (Sẽ được nhân viên gọi hướng dẫn)
            </label>
          </div>
        </div>

        <button type="submit" id="btn-confirm-order" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; font-size: 1.1rem; padding: 1rem;">
          Xác nhận Đặt hàng
        </button>
      </form>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 E-com.</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script>
    const user = getCurrentUser();
    if (!user || user.role !== 'customer') {
      window.location.href = 'login.html';
    }

    let serverProducts = [];

    async function updateQuantity(productId, delta) {
      const cart = getCart();
      const productObj = serverProducts.find(p => p.id === productId);
      
      const itemIndex = cart.findIndex(i => i.id === productId);
      if (itemIndex > -1) {
        if (delta > 0 && productObj && cart[itemIndex].quantity + delta > productObj.stock) {
          alert(`Chỉ còn tối đa ${productObj.stock} sản phẩm trong kho!`);
          return;
        }
        cart[itemIndex].quantity += delta;
        if (cart[itemIndex].quantity <= 0) {
          cart.splice(itemIndex, 1);
        }
        saveCart(cart);
        await renderCart();
        updateCartBadge();
      }
    }

    async function removeItem(productId) {
      let cart = getCart();
      cart = cart.filter(i => i.id !== productId);
      saveCart(cart);
      await renderCart();
      updateCartBadge();
    }

    async function toggleItemSelection(productId) {
      const cart = getCart();
      const item = cart.find(i => i.id === productId);
      if (item) {
        item.selected = (item.selected === false) ? true : false;
        saveCart(cart);
        await renderCart();
      }
    }

    async function toggleAllSelection(event) {
      const isChecked = event.target.checked;
      const cart = getCart();
      cart.forEach(item => item.selected = isChecked);
      saveCart(cart);
      await renderCart();
    }

    async function renderCart() {
      const cartItemsEl = document.getElementById('cart-items');
      const cartSummaryEl = document.getElementById('cart-summary');
      const cart = getCart();

      if (cart.length === 0) {
        cartItemsEl.innerHTML = `
          <div class="text-center" style="padding: 2rem 0; color: var(--text-muted);">
            Giỏ hàng của bạn đang trống.<br><br>
            <a href="index.html" class="btn btn-primary">Mua sắm ngay</a>
          </div>`;
        cartSummaryEl.style.display = 'none';
        return;
      }

      // Fetch products to check stock
      try {
        if (serverProducts.length === 0) {
          serverProducts = await api.getProducts();
        }
      } catch (err) {
        console.error('Error fetching products:', err);
      }

      const allSelected = cart.length > 0 && cart.every(item => item.selected !== false);

      cartItemsEl.innerHTML = `
        <div class="cart-header" style="padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem;">
          <input type="checkbox" id="select-all" style="width: 1.2rem; height: 1.2rem; cursor: pointer;" ${allSelected ? 'checked' : ''} onchange="toggleAllSelection(event)">
          <label for="select-all" style="font-weight: 600; cursor: pointer;">Chọn tất cả</label>
        </div>
      ` + cart.map(item => {
        const isSelected = item.selected !== false;
        const productFromDb = serverProducts.find(p => p.id === item.id);
        const currentStock = productFromDb ? productFromDb.stock : 0;
        
        return `
        <div class="cart-item" style="${!isSelected ? 'opacity: 0.6;' : 'opacity: 1;'}">
          <input type="checkbox" style="width: 1.2rem; height: 1.2rem; cursor: pointer;" ${isSelected ? 'checked' : ''} onchange="toggleItemSelection(${item.id})">
          <img src="${item.image}" alt="${item.name}" class="cart-item-img" onerror="this.src='https://via.placeholder.com/80?text=No+Img';">
          <div class="cart-item-info">
            <div class="cart-item-title">${item.name}</div>
            <div class="cart-item-price">${formatCurrency(item.price)} <span style="font-size:0.8rem; color:var(--text-muted); margin-left:0.5rem">(Kho: ${currentStock})</span></div>
          </div>
          <div class="d-flex gap-2" style="align-items: center;">
            <button class="btn btn-outline" onclick="updateQuantity(${item.id}, -1)">-</button>
            <span style="width: 30px; text-align: center; font-weight: 600;">${item.quantity}</span>
            <button class="btn btn-outline" onclick="updateQuantity(${item.id}, 1)">+</button>
          </div>
          <button class="btn btn-danger" onclick="removeItem(${item.id})" style="margin-left: 1rem;">Xóa</button>
        </div>
        `;
      }).join('');

      cartSummaryEl.style.display = 'block';
      
      const selectedCart = cart.filter(item => item.selected !== false);
      const totalQty = selectedCart.reduce((sum, item) => sum + item.quantity, 0);
      const totalPrice = selectedCart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      
      document.getElementById('total-qty').textContent = totalQty;
      document.getElementById('total-price').textContent = formatCurrency(totalPrice);
    }

    document.getElementById('btn-checkout')?.addEventListener('click', () => {
      const fullCart = getCart();
      const cart = fullCart.filter(item => item.selected !== false);
      
      if(cart.length === 0) {
        alert('Vui lòng chọn ít nhất một sản phẩm để thanh toán!');
        return;
      }
      
      // Pre-fill user data
      const currentUser = getCurrentUser();
      if (currentUser) {
        document.getElementById('co-name').value = currentUser.name || '';
        document.getElementById('co-phone').value = currentUser.phone || '';
      }
      
      document.getElementById('checkout-modal').classList.add('active');
    });

    document.getElementById('checkout-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-confirm-order');
      btn.disabled = true;
      btn.textContent = 'Đang xử lý đặt hàng...';

      const name = document.getElementById('co-name').value;
      const phone = document.getElementById('co-phone').value;
      const address = document.getElementById('co-address').value;
      const paymethod = document.querySelector('input[name="paymethod"]:checked').value;

      const fullCart = getCart();
      const items = fullCart.filter(item => item.selected !== false);
      const total = items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const shipping = { name, phone, address, paymethod };
      
      try {
        const order = await api.createOrder(items, total, shipping);

        // Success flow
        const remainingCart = fullCart.filter(item => item.selected === false);
        saveCart(remainingCart);
        
        document.getElementById('checkout-modal').classList.remove('active');
        document.getElementById('cart-container').style.display = 'none';
        document.getElementById('order-id').textContent = order.id;
        document.getElementById('checkout-success').classList.remove('hidden');
        updateCartBadge();
        window.scrollTo(0, 0);
        showToast('Đặt hàng thành công!', 'success');
      } catch (err) {
        alert('Lỗi đặt hàng: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Xác nhận Đặt hàng';
      }
    });

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
